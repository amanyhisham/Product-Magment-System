<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CRUDS</title>
</head>
<body>
    <div class="cruds">
         <div class="head">
            <h2>
  CRUDS
    <span id="toggleMode" style="cursor:pointer; font-size:1.2rem;">🌙</span>

 </h2>
            <p>System Product Mangment</p>
        </div>
        <div class="input">
<input type="text" id="title" placeholder="Product Name" pattern="[A-Za-z\s]+" title="Only letters allowed" required>
             <div class="price">
                <input onkeyup="getTotal()" type="number" id="price"  placeholder="  Price" required>
                <input onkeyup="getTotal()" type="number" id="taxes" placeholder="  Taxes" required>
                <input onkeyup="getTotal()" type="number" id="ads" placeholder="  Ads" required>
                <input  onkeyup="getTotal()"type="number" id="discount" placeholder="  Discount" required>
                <small  onkeyup="getTotal()" id="total" class="total">0</small>
             </div>
             <input type="number" id="count" placeholder="  Count" required>
<input type="text" id="category" placeholder="Category" pattern="[A-Za-z\s]+" title="Only letters allowed" required>
<button type="button" id="submit">Create</button>
        </div>
        <div class="output">
            <input type="text" id="search" placeholder="Search By Name" onkeyup="searchData(this.value)">
            <div class="btn-search">
                <button class="btn"id="searchTitle" onclick="getsearchmood(this.id)">Search By Title</button>
                <button class="btn" id="searchCategory" onclick="getsearchmood(this.id)">Search By Category</button>
            </div>
            <div id="deletAll"></div>
             
            

            <table>
               <thead>
        <tr>
            <th>#ID</th>
            <th onclick="sortData('title')">
                Title <span class="sort-arrow">⇅</span>
            </th>
            <th onclick="sortData('price')">
                Price <span class="sort-arrow">⇅</span>
            </th>
            <th onclick="sortData('taxes')">
                Taxes <span class="sort-arrow">⇅</span>
            </th>
            <th onclick="sortData('ads')">
                Ads <span class="sort-arrow">⇅</span>
            </th>
            <th onclick="sortData('discount')">
                Discount <span class="sort-arrow">⇅</span>
            </th>
            <th onclick="sortData('total')">
                Total <span class="sort-arrow">⇅</span>
            </th>
            <th onclick="sortData('category')">
                Category <span class="sort-arrow">⇅</span>
            </th>
            <th>Update</th>
            <th>Delete</th>
        </tr>
    </thead>
                <tbody id="table-body">
                    <!-- Dynamic Content by js-->
                </tbody>
        </div>
        
    </div>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <script src="script.js"></script>
</body>
</html>
